<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — CollegeMatch AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #07091a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 900;
      color: white;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(124,58,237,0.4);
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      color: #9ca3af;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
    .emoji { font-size: 48px; margin-bottom: 16px; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">📴</span>
    <div class="icon">CM</div>
    <h1>CollegeMatch AI</h1>
    <p>
      No internet connection detected. 
      Some features may not be available offline.
      Please check your connection and try again.
    </p>
    <button class="btn" onclick="window.location.reload()">
      🔄 Try Again
    </button>
  </div>
</body>
</html>
