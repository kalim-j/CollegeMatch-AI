<svg xmlns="http://www.w3.org/2000/svg"
    width="128" height="128"
    viewBox="0 0 128 128">
    <defs>
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e1058"/>
        <stop offset="40%" stop-color="#6d28d9"/>
        <stop offset="100%" stop-color="#db2777"/>
      </linearGradient>
      <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
      <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#e9d5ff"/>
      </linearGradient>
      <filter id="softShadow">
        <feDropShadow dx="0" dy="1.92"
          stdDeviation="3.2"
          flood-color="#000000" flood-opacity="0.35"/>
      </filter>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2.304" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>

    <!-- Main background -->
    <rect width="128" height="128"
      rx="28.16" ry="28.16"
      fill="url(#bg)"/>

    <!-- Shine top half -->
    <rect width="128" height="64"
      rx="28.16" ry="28.16"
      fill="url(#shine)"/>

    <!-- Decorative background circles -->
    <circle cx="12.8" cy="15.36"
      r="17.92"
      fill="rgba(255,255,255,0.05)"/>
    <circle cx="112.64" cy="112.64"
      r="23.04"
      fill="rgba(255,255,255,0.04)"/>
    <circle cx="115.2" cy="19.2"
      r="11.52"
      fill="rgba(255,255,255,0.06)"/>

    <!-- Star sparkles -->
    <circle cx="104.96" cy="35.84"
      r="2.304"
      fill="rgba(255,255,255,0.7)"/>
    <circle cx="23.04" cy="92.16"
      r="1.792"
      fill="rgba(255,255,255,0.5)"/>
    <circle cx="96" cy="96"
      r="1.536"
      fill="rgba(255,220,100,0.7)"/>

    <!-- Graduation Cap -->
    <g transform="translate(64, 38.4)"
      filter="url(#softShadow)">
      <!-- Cap diamond top -->
      <polygon
        points="0,-20.48 28.16,-3.84 0,11.52 -28.16,-3.84"
        fill="url(#capGrad)"/>
      <!-- Cap brim -->
      <rect x="-25.6" y="-4.48"
        width="51.2" height="12.8"
        rx="2.56"
        fill="rgba(255,255,255,0.85)"/>
      <!-- Gold tassel rope -->
      <line
        x1="25.6" y1="3.2"
        x2="25.6" y2="21.76"
        stroke="#FFD700"
        stroke-width="3.584"
        stroke-linecap="round"/>
      <!-- Tassel end -->
      <circle cx="25.6" cy="23.04"
        r="4.096"
        fill="#FFD700"/>
      <line
        x1="25.6" y1="26.88"
        x2="23.04" y2="34.56"
        stroke="#FFD700"
        stroke-width="1.792"
        stroke-linecap="round"/>
      <line
        x1="25.6" y1="26.88"
        x2="25.6" y2="35.84"
        stroke="#FFD700"
        stroke-width="1.792"
        stroke-linecap="round"/>
      <line
        x1="25.6" y1="26.88"
        x2="28.16" y2="34.56"
        stroke="#FFD700"
        stroke-width="1.792"
        stroke-linecap="round"/>
    </g>

    <!-- CM Text -->
    <text x="64" y="89.6"
      font-family="Arial Black, Arial, sans-serif"
      font-size="35.84"
      font-weight="900"
      fill="white"
      text-anchor="middle"
      dominant-baseline="middle"
      filter="url(#softShadow)"
      letter-spacing="0.64">CM</text>

    <!-- CollegeMatch label -->
    <text x="64" y="111.36"
      font-family="Arial, sans-serif"
      font-size="9.6"
      font-weight="700"
      fill="rgba(255,255,255,0.75)"
      text-anchor="middle"
      letter-spacing="0.768">COLLEGEMATCH AI</text>

    <!-- Bottom glow line -->
    <rect x="32" y="117.12"
      width="64" height="0.896"
      rx="0.512"
      fill="rgba(255,255,255,0.25)"/>
  </svg>