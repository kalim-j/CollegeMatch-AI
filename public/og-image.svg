<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#05071a"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cfc;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#05071a;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Glassmorphism effect -->
    <filter id="glass">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0.3" />
      </feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#7c5cfc" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#7c5cfc" opacity="0.1"/>
  
  <!-- Glass card effect -->
  <rect x="100" y="150" width="1000" height="330" rx="20" fill="rgba(124, 92, 252, 0.1)" stroke="rgba(124, 92, 252, 0.3)" stroke-width="2"/>
  
  <!-- Graduation cap icon -->
  <g transform="translate(150, 220)">
    <!-- Cap base -->
    <polygon points="50,20 100,0 150,20 100,40" fill="#7c5cfc"/>
    <!-- Cap top -->
    <rect x="95" y="20" width="10" height="40" fill="#7c5cfc"/>
    <circle cx="100" cy="65" r="8" fill="#7c5cfc"/>
    <!-- Tassel -->
    <line x1="100" y1="65" x2="110" y2="80" stroke="#7c5cfc" stroke-width="2"/>
  </g>
  
  <!-- Main text -->
  <text x="400" y="300" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">
    CollegeMatch-AI
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="32" fill="#a78bfa">
    AI-Powered College Finder for Indian Students
  </text>
  
  <!-- Feature highlights -->
  <text x="400" y="420" font-family="Arial, sans-serif" font-size="24" fill="#c4b5fd">
    ✓ Smart Matching  ✓ Cutoff Prediction  ✓ College Comparison
  </text>
</svg>
