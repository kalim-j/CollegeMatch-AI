<svg xmlns="http://www.w3.org/2000/svg"
    width="152" height="152"
    viewBox="0 0 152 152">
    <defs>
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e1058"/>
        <stop offset="40%" stop-color="#6d28d9"/>
        <stop offset="100%" stop-color="#db2777"/>
      </linearGradient>
      <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
      <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#e9d5ff"/>
      </linearGradient>
      <filter id="softShadow">
        <feDropShadow dx="0" dy="2.28"
          stdDeviation="3.8000000000000003"
          flood-color="#000000" flood-opacity="0.35"/>
      </filter>
      <filter id="glow">
        <feGaussianBlur stdDeviation="2.7359999999999998" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>

    <!-- Main background -->
    <rect width="152" height="152"
      rx="33.44" ry="33.44"
      fill="url(#bg)"/>

    <!-- Shine top half -->
    <rect width="152" height="76"
      rx="33.44" ry="33.44"
      fill="url(#shine)"/>

    <!-- Decorative background circles -->
    <circle cx="15.200000000000001" cy="18.24"
      r="21.28"
      fill="rgba(255,255,255,0.05)"/>
    <circle cx="133.76" cy="133.76"
      r="27.36"
      fill="rgba(255,255,255,0.04)"/>
    <circle cx="136.8" cy="22.8"
      r="13.68"
      fill="rgba(255,255,255,0.06)"/>

    <!-- Star sparkles -->
    <circle cx="124.63999999999999" cy="42.56"
      r="2.7359999999999998"
      fill="rgba(255,255,255,0.7)"/>
    <circle cx="27.36" cy="109.44"
      r="2.128"
      fill="rgba(255,255,255,0.5)"/>
    <circle cx="114" cy="114"
      r="1.824"
      fill="rgba(255,220,100,0.7)"/>

    <!-- Graduation Cap -->
    <g transform="translate(76, 45.6)"
      filter="url(#softShadow)">
      <!-- Cap diamond top -->
      <polygon
        points="0,-24.32 33.44,-4.56 0,13.68 -33.44,-4.56"
        fill="url(#capGrad)"/>
      <!-- Cap brim -->
      <rect x="-30.400000000000002" y="-5.32"
        width="60.800000000000004" height="15.200000000000001"
        rx="3.04"
        fill="rgba(255,255,255,0.85)"/>
      <!-- Gold tassel rope -->
      <line
        x1="30.400000000000002" y1="3.8000000000000003"
        x2="30.400000000000002" y2="25.840000000000003"
        stroke="#FFD700"
        stroke-width="4.256"
        stroke-linecap="round"/>
      <!-- Tassel end -->
      <circle cx="30.400000000000002" cy="27.36"
        r="4.864"
        fill="#FFD700"/>
      <line
        x1="30.400000000000002" y1="31.919999999999998"
        x2="27.36" y2="41.040000000000006"
        stroke="#FFD700"
        stroke-width="2.128"
        stroke-linecap="round"/>
      <line
        x1="30.400000000000002" y1="31.919999999999998"
        x2="30.400000000000002" y2="42.56"
        stroke="#FFD700"
        stroke-width="2.128"
        stroke-linecap="round"/>
      <line
        x1="30.400000000000002" y1="31.919999999999998"
        x2="33.44" y2="41.040000000000006"
        stroke="#FFD700"
        stroke-width="2.128"
        stroke-linecap="round"/>
    </g>

    <!-- CM Text -->
    <text x="76" y="106.39999999999999"
      font-family="Arial Black, Arial, sans-serif"
      font-size="42.56"
      font-weight="900"
      fill="white"
      text-anchor="middle"
      dominant-baseline="middle"
      filter="url(#softShadow)"
      letter-spacing="0.76">CM</text>

    <!-- CollegeMatch label -->
    <text x="76" y="132.24"
      font-family="Arial, sans-serif"
      font-size="11.4"
      font-weight="700"
      fill="rgba(255,255,255,0.75)"
      text-anchor="middle"
      letter-spacing="0.912">COLLEGEMATCH AI</text>

    <!-- Bottom glow line -->
    <rect x="38" y="139.08"
      width="76" height="1.064"
      rx="0.608"
      fill="rgba(255,255,255,0.25)"/>
  </svg>