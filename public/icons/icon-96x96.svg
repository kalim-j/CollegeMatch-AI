<svg xmlns="http://www.w3.org/2000/svg"
    width="96" height="96"
    viewBox="0 0 96 96">
    <defs>
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e1058"/>
        <stop offset="40%" stop-color="#6d28d9"/>
        <stop offset="100%" stop-color="#db2777"/>
      </linearGradient>
      <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
      <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#e9d5ff"/>
      </linearGradient>
      <filter id="softShadow">
        <feDropShadow dx="0" dy="1.44"
          stdDeviation="2.4000000000000004"
          flood-color="#000000" flood-opacity="0.35"/>
      </filter>
      <filter id="glow">
        <feGaussianBlur stdDeviation="1.7279999999999998" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>

    <!-- Main background -->
    <rect width="96" height="96"
      rx="21.12" ry="21.12"
      fill="url(#bg)"/>

    <!-- Shine top half -->
    <rect width="96" height="48"
      rx="21.12" ry="21.12"
      fill="url(#shine)"/>

    <!-- Decorative background circles -->
    <circle cx="9.600000000000001" cy="11.52"
      r="13.440000000000001"
      fill="rgba(255,255,255,0.05)"/>
    <circle cx="84.48" cy="84.48"
      r="17.28"
      fill="rgba(255,255,255,0.04)"/>
    <circle cx="86.4" cy="14.399999999999999"
      r="8.64"
      fill="rgba(255,255,255,0.06)"/>

    <!-- Star sparkles -->
    <circle cx="78.72" cy="26.880000000000003"
      r="1.7279999999999998"
      fill="rgba(255,255,255,0.7)"/>
    <circle cx="17.28" cy="69.12"
      r="1.344"
      fill="rgba(255,255,255,0.5)"/>
    <circle cx="72" cy="72"
      r="1.1520000000000001"
      fill="rgba(255,220,100,0.7)"/>

    <!-- Graduation Cap -->
    <g transform="translate(48, 21.12)"
      filter="url(#softShadow)">
      <!-- Cap diamond top -->
      <polygon
        points="0,-15.36 21.12,-2.88 0,8.64 -21.12,-2.88"
        fill="url(#capGrad)"/>
      <!-- Cap brim -->
      <rect x="-19.200000000000003" y="-3.3600000000000003"
        width="38.400000000000006" height="9.600000000000001"
        rx="1.92"
        fill="rgba(255,255,255,0.85)"/>
      <!-- Gold tassel rope -->
      <line
        x1="19.200000000000003" y1="2.4000000000000004"
        x2="19.200000000000003" y2="16.32"
        stroke="#FFD700"
        stroke-width="2.688"
        stroke-linecap="round"/>
      <!-- Tassel end -->
      <circle cx="19.200000000000003" cy="17.28"
        r="3.072"
        fill="#FFD700"/>
      <line
        x1="19.200000000000003" y1="20.16"
        x2="17.28" y2="25.92"
        stroke="#FFD700"
        stroke-width="1.344"
        stroke-linecap="round"/>
      <line
        x1="19.200000000000003" y1="20.16"
        x2="19.200000000000003" y2="26.880000000000003"
        stroke="#FFD700"
        stroke-width="1.344"
        stroke-linecap="round"/>
      <line
        x1="19.200000000000003" y1="20.16"
        x2="21.12" y2="25.92"
        stroke="#FFD700"
        stroke-width="1.344"
        stroke-linecap="round"/>
    </g>

    <!-- CM Text -->
    <text x="48" y="51.84"
      font-family="Arial Black, Arial, sans-serif"
      font-size="26.880000000000003"
      font-weight="900"
      fill="white"
      text-anchor="middle"
      dominant-baseline="middle"
      filter="url(#softShadow)"
      letter-spacing="0.48">CM</text>

    <!-- CollegeMatch label -->
    <text x="48" y="73.92"
      font-family="Arial, sans-serif"
      font-size="7.199999999999999"
      font-weight="700"
      fill="rgba(255,255,255,0.75)"
      text-anchor="middle"
      letter-spacing="0.5760000000000001">COLLEGEMATCH AI</text>

    <!-- Bottom glow line -->
    <rect x="24" y="80.64"
      width="48" height="0.672"
      rx="0.384"
      fill="rgba(255,255,255,0.25)"/>
  </svg>