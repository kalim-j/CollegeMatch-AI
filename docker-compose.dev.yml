version: '3.8'
services:
  eduanalytics-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    restart: unless-stopped
