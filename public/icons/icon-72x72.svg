<svg xmlns="http://www.w3.org/2000/svg"
    width="72" height="72"
    viewBox="0 0 72 72">
    <defs>
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e1058"/>
        <stop offset="40%" stop-color="#6d28d9"/>
        <stop offset="100%" stop-color="#db2777"/>
      </linearGradient>
      <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </linearGradient>
      <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="100%" stop-color="#e9d5ff"/>
      </linearGradient>
      <filter id="softShadow">
        <feDropShadow dx="0" dy="1.08"
          stdDeviation="1.8"
          flood-color="#000000" flood-opacity="0.35"/>
      </filter>
      <filter id="glow">
        <feGaussianBlur stdDeviation="1.2959999999999998" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>

    <!-- Main background -->
    <rect width="72" height="72"
      rx="15.84" ry="15.84"
      fill="url(#bg)"/>

    <!-- Shine top half -->
    <rect width="72" height="36"
      rx="15.84" ry="15.84"
      fill="url(#shine)"/>

    <!-- Decorative background circles -->
    <circle cx="7.2" cy="8.64"
      r="10.080000000000002"
      fill="rgba(255,255,255,0.05)"/>
    <circle cx="63.36" cy="63.36"
      r="12.959999999999999"
      fill="rgba(255,255,255,0.04)"/>
    <circle cx="64.8" cy="10.799999999999999"
      r="6.4799999999999995"
      fill="rgba(255,255,255,0.06)"/>

    <!-- Star sparkles -->
    <circle cx="59.04" cy="20.160000000000004"
      r="1.2959999999999998"
      fill="rgba(255,255,255,0.7)"/>
    <circle cx="12.959999999999999" cy="51.839999999999996"
      r="1.008"
      fill="rgba(255,255,255,0.5)"/>
    <circle cx="54" cy="54"
      r="0.864"
      fill="rgba(255,220,100,0.7)"/>

    <!-- Graduation Cap -->
    <g transform="translate(36, 15.84)"
      filter="url(#softShadow)">
      <!-- Cap diamond top -->
      <polygon
        points="0,-11.52 15.84,-2.16 0,6.4799999999999995 -15.84,-2.16"
        fill="url(#capGrad)"/>
      <!-- Cap brim -->
      <rect x="-14.4" y="-2.5200000000000005"
        width="28.8" height="7.2"
        rx="1.44"
        fill="rgba(255,255,255,0.85)"/>
      <!-- Gold tassel rope -->
      <line
        x1="14.4" y1="1.8"
        x2="14.4" y2="12.24"
        stroke="#FFD700"
        stroke-width="2.016"
        stroke-linecap="round"/>
      <!-- Tassel end -->
      <circle cx="14.4" cy="12.959999999999999"
        r="2.3040000000000003"
        fill="#FFD700"/>
      <line
        x1="14.4" y1="15.12"
        x2="12.959999999999999" y2="19.44"
        stroke="#FFD700"
        stroke-width="1.008"
        stroke-linecap="round"/>
      <line
        x1="14.4" y1="15.12"
        x2="14.4" y2="20.160000000000004"
        stroke="#FFD700"
        stroke-width="1.008"
        stroke-linecap="round"/>
      <line
        x1="14.4" y1="15.12"
        x2="15.84" y2="19.44"
        stroke="#FFD700"
        stroke-width="1.008"
        stroke-linecap="round"/>
    </g>

    <!-- CM Text -->
    <text x="36" y="38.88"
      font-family="Arial Black, Arial, sans-serif"
      font-size="20.160000000000004"
      font-weight="900"
      fill="white"
      text-anchor="middle"
      dominant-baseline="middle"
      filter="url(#softShadow)"
      letter-spacing="0.36">CM</text>

    <!-- CollegeMatch label -->
    <text x="36" y="55.44"
      font-family="Arial, sans-serif"
      font-size="5.3999999999999995"
      font-weight="700"
      fill="rgba(255,255,255,0.75)"
      text-anchor="middle"
      letter-spacing="0.432">COLLEGEMATCH AI</text>

    <!-- Bottom glow line -->
    <rect x="18" y="60.48"
      width="36" height="0.504"
      rx="0.28800000000000003"
      fill="rgba(255,255,255,0.25)"/>
  </svg>